services:
  redis:
    image: redis:alpine
    container_name: my-redis
    networks:
      - mynetwork

  web:
    build: .
    container_name: my-webapp
    ports:
      - "5000:5000"
    networks:
      - mynetwork
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

networks:
  mynetwork:
    driver: bridge